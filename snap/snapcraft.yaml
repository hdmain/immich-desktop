name: immich-desktop
base: core24
version: '0.1.4'
summary: Unofficial Immich desktop client
description: |
  Unofficial fan-made Qt desktop client for Immich, a self-hosted photo and
  video management platform.

  Connect to your Immich server with an API key to browse your library,
  explore people and places, upload and download media, and stream videos.

  This project is not affiliated with, maintained by, or endorsed by the
  official Immich project.
grade: stable
confinement: strict
license: MIT

icon: resources/immich-logo-512.png
website: https://github.com/hdmain/immich-desktop
source-code: https://github.com/hdmain/immich-desktop
issues: https://github.com/hdmain/immich-desktop/issues
contact: https://github.com/hdmain/immich-desktop/issues

platforms:
  amd64:

apps:
  immich-desktop:
    extensions:
      - gnome
    common-id: com.github.hdmain.immich-desktop
    desktop: usr/share/applications/immich.desktop
    command: usr/bin/immich
    plugs:
      - audio-playback
      - home
      - network
      - network-bind
      - opengl
      - removable-media
    environment:
      QT_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins
      QT_QPA_PLATFORM_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins/platforms
      LIBGL_DRIVERS_PATH: $SNAP/usr/lib/x86_64-linux-gnu/dri

parts:
  immich:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -GNinja
    parse-info:
      - usr/share/metainfo/immich-desktop.metainfo.xml
    build-packages:
      - build-essential
      - cmake
      - ninja-build
      - pkg-config
      - libgl1-mesa-dev
      - qt6-base-dev
      - qt6-base-dev-tools
      - qt6-multimedia-dev
      - libqt6svg6-dev
      - qt6-image-formats-plugins
    stage-packages:
      - libqt6core6t64
      - libqt6gui6t64
      - libqt6widgets6t64
      - libqt6network6t64
      - libqt6opengl6t64
      - libqt6dbus6t64
      - libqt6svg6
      - libqt6multimedia6t64
      - libqt6multimediawidgets6t64
      - qt6-qpa-plugins
      - qt6-gtk-platformtheme
      - qt6-image-formats-plugins
      - qt6-svg-plugins
      - libpulse0
      - libavcodec60
      - libavformat60
      - libavutil58
      - libswresample4
      - libswscale7
      - libgl1
      - libglib2.0-0t64
      - libxkbcommon0
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-xinerama0
      - libxcb-xinput0
      - libxcb-xfixes0
    override-pull: |
      craftctl default
      VERSION="$(sed -n 's/^project(immich[[:space:]]*VERSION[[:space:]]*\([0-9.]*\).*/\1/p' CMakeLists.txt | head -n1)"
      if [ -n "$VERSION" ]; then
        craftctl set version="$VERSION"
      fi
    prime:
      - -usr/include
      - -usr/lib/*/cmake
      - -usr/lib/*/pkgconfig
      - -usr/share/doc
      - -usr/share/man
      - -usr/share/lintian
