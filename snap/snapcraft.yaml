name: immich-desktop
base: core24
adopt-info: immich
summary: Unofficial Immich desktop client
description: |
  Unofficial Qt desktop client for Immich. Connect with an API key to browse
  your library, search, explore people and places, upload and download photos
  and videos, stream media, and keep working offline with a local cache.
  Includes system tray, autostart, and single-instance support.

  This project is not affiliated with, maintained by, or endorsed by the
  official Immich project.
grade: stable
confinement: strict
license: MIT

icon: resources/immich-logo-512.png
website: https://github.com/hdmain/immich-desktop
source-code: https://github.com/hdmain/immich-desktop
issues: https://github.com/hdmain/immich-desktop/issues
contact: https://github.com/hdmain/immich-desktop/issues

platforms:
  amd64:

apps:
  immich-desktop:
    extensions:
      - gnome
    common-id: com.github.hdmain.immich-desktop
    desktop: usr/share/applications/immich.desktop
    command: bin/immich-launch
    plugs:
      - audio-playback
      - home
      - network
      - network-bind
      - opengl
      - removable-media
    environment:
      QT_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins
      QT_QPA_PLATFORM_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins/platforms
      LIBGL_DRIVERS_PATH: $SNAP/usr/lib/x86_64-linux-gnu/dri
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}

parts:
  launcher:
    plugin: dump
    source: snap/local
    organize:
      immich-launch: bin/immich-launch
    override-prime: |
      craftctl default
      # Guaranteed LF shebang even if the source tree was checked out on Windows.
      sed -i 's/\r$//' "$CRAFT_PRIME/bin/immich-launch"
      chmod +x "$CRAFT_PRIME/bin/immich-launch"
    stage:
      - bin/immich-launch
    prime:
      - bin/immich-launch

  immich:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -GNinja
    parse-info:
      - usr/share/metainfo/immich-desktop.metainfo.xml
    build-packages:
      - build-essential
      - cmake
      - ninja-build
      - pkg-config
      - libgl1-mesa-dev
      - qt6-base-dev
      - qt6-base-dev-tools
      - qt6-multimedia-dev
      - libqt6svg6-dev
      - qt6-image-formats-plugins
    stage-packages:
      - libqt6core6t64
      - libqt6gui6t64
      - libqt6widgets6t64
      - libqt6network6t64
      - libqt6opengl6t64
      - libqt6dbus6t64
      - libqt6svg6
      - libqt6multimedia6
      - libqt6multimediawidgets6
      - qt6-qpa-plugins
      - qt6-wayland
      - qt6-gtk-platformtheme
      - qt6-image-formats-plugins
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-libav
      - libpulse0
      - libavcodec60
      - libavformat60
      - libavutil58
      - libswresample4
      - libswscale7
      - libgl1
      - libegl1
      - libglib2.0-0t64
      - libxkbcommon0
      - libxkbcommon-x11-0
      - libx11-xcb1
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-xinerama0
      - libxcb-xinput0
      - libxcb-xfixes0
      - libxcb-util1
      - libice6
      - libsm6

    override-pull: |
      craftctl default
      VERSION="$(tr '\n' ' ' < CMakeLists.txt | sed -n 's/.*project([[:space:]]*immich[[:space:]]*VERSION[[:space:]]*\([0-9.]*\).*/\1/p')"
      if [ -n "$VERSION" ]; then
        craftctl set version="$VERSION"
      fi
    prime:
      - -usr/include
      - -usr/lib/*/cmake
      - -usr/lib/*/pkgconfig
      - -usr/share/doc
      - -usr/share/man
      - -usr/share/lintian
