name: Build installers

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows installers
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: win64_msvc2022_64
          cache: true

      - name: Install installer toolchains
        shell: powershell
        run: |
          choco install nsis wixtoolset -y --no-progress
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "${env:ProgramFiles(x86)}\NSIS" | Out-File $env:GITHUB_PATH -Append
          $wix = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory |
            Where-Object Name -Like "WiX Toolset v3*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $wix) { throw "WiX Toolset v3 installation was not found." }
          (Join-Path $wix.FullName "bin") | Out-File $env:GITHUB_PATH -Append

      - name: Configure
        shell: powershell
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: powershell
        run: cmake --build build --config Release --parallel

      - name: Create EXE and MSI installers
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          cpack --config build/CPackConfig.cmake -C Release -G NSIS -B dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cpack --config build/CPackConfig.cmake -C Release -G WIX -B dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: error

  linux:
    name: Linux packages
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            file \
            libfuse2 \
            libqt6svg6-dev \
            ninja-build \
            patchelf \
            qt6-base-dev \
            qt6-base-dev-tools \
            wget

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Create Debian package
        run: |
          mkdir -p dist
          cpack --config build/CPackConfig.cmake -G DEB -B dist

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          OUTPUT: immich-desktop-x86_64.AppImage
        run: |
          cmake --install build --prefix "$PWD/AppDir/usr"
          wget -q \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export PATH="$PWD:$PATH"
          if [ -x /usr/lib/qt6/bin/qmake ]; then
            export QMAKE=/usr/lib/qt6/bin/qmake
          fi
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/immich \
            --desktop-file AppDir/usr/share/applications/immich.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/1024x1024/apps/immich.png \
            --plugin qt \
            --output appimage
          mv "$OUTPUT" dist/

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - linux
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.deb
            dist/*.AppImage
