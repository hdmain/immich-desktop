name: Build installers

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows installers
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: win64_msvc2022_64
          modules: qtimageformats qtmultimedia
          cache: true

      - name: Install installer toolchains
        shell: powershell
        run: |
          choco install nsis wixtoolset -y --no-progress
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "${env:ProgramFiles(x86)}\NSIS" | Out-File $env:GITHUB_PATH -Append
          $wix = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory |
            Where-Object Name -Like "WiX Toolset v3*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $wix) { throw "WiX Toolset v3 installation was not found." }
          (Join-Path $wix.FullName "bin") | Out-File $env:GITHUB_PATH -Append

      - name: Configure
        shell: powershell
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: powershell
        run: cmake --build build --config Release --parallel

      - name: Create EXE and MSI installers
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          cpack --config build/CPackConfig.cmake -C Release -G NSIS -B dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cpack --config build/CPackConfig.cmake -C Release -G WIX -B dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: error

  linux:
    name: Linux packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            linuxdeploy_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            linuxdeploy_arch: aarch64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            file \
            libfuse2 \
            libgl1-mesa-dev \
            libqt6svg6-dev \
            ninja-build \
            patchelf \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-image-formats-plugins \
            qt6-multimedia-dev \
            wget

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Create Debian package
        run: |
          mkdir -p dist
          cpack --config build/CPackConfig.cmake -G DEB -B dist

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          LINUXDEPLOY_ARCH: ${{ matrix.linuxdeploy_arch }}
        run: |
          cmake --install build --prefix "$PWD/AppDir/usr"
          OUTPUT="immich-desktop-${LINUXDEPLOY_ARCH}.AppImage"
          wget -q \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${LINUXDEPLOY_ARCH}.AppImage"
          wget -q \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${LINUXDEPLOY_ARCH}.AppImage"
          chmod +x "linuxdeploy-${LINUXDEPLOY_ARCH}.AppImage" "linuxdeploy-plugin-qt-${LINUXDEPLOY_ARCH}.AppImage"
          export PATH="$PWD:$PATH"
          if [ -x /usr/lib/qt6/bin/qmake ]; then
            export QMAKE=/usr/lib/qt6/bin/qmake
          fi
          "./linuxdeploy-${LINUXDEPLOY_ARCH}.AppImage" \
            --appdir AppDir \
            --executable AppDir/usr/bin/immich \
            --desktop-file AppDir/usr/share/applications/immich-desktop.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/immich-desktop.png \
            --plugin qt \
            --output appimage
          mv "$OUTPUT" dist/

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: error

  snap:
    name: Snap package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload snap
        uses: actions/upload-artifact@v4
        with:
          name: linux-snap-${{ matrix.arch }}
          path: ${{ steps.build.outputs.snap }}
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - linux
      - snap
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes from changelog.json
        id: changelog
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import sys

          path = pathlib.Path("changelog.json")
          if not path.is_file():
              print("changelog.json is missing", file=sys.stderr)
              sys.exit(1)

          data = json.loads(path.read_text(encoding="utf-8"))
          version = str(data.get("version", "")).strip()
          notes = str(data.get("what_changed", "")).strip()
          if not notes:
              print("changelog.json what_changed is empty", file=sys.stderr)
              sys.exit(1)

          tag = "${{ github.ref_name }}"
          expected = tag[1:] if tag.startswith("v") else tag
          if version and version != expected:
              print(
                  f"warning: changelog.json version {version!r} does not match tag {tag!r}",
                  file=sys.stderr,
              )

          pathlib.Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
          print(f"Prepared release notes for {tag} ({len(notes)} chars)")
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.deb
            dist/*.AppImage
            dist/*.snap
